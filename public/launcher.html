<!-- CAPTCHA widget -->
<div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY"></div>

<form id="mailForm">
  <input id="senderName" placeholder="Sender Name" />
  <input id="email" placeholder="Gmail" />
  <input id="pass" placeholder="App Password" type="password" />
  <input id="subject" placeholder="Subject" />
  <textarea id="message" placeholder="Message"></textarea>
  <textarea id="recipients" placeholder="Recipients (comma or newline)"></textarea>
  <button type="submit" id="sendBtn">Send All</button>
</form>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script>
  document.getElementById('mailForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {
      senderName: document.getElementById('senderName').value.trim(),
      email: document.getElementById('email').value.trim(),
      password: document.getElementById('pass').value.trim(),
      subject: document.getElementById('subject').value.trim(),
      message: document.getElementById('message').value.trim(),
      recipients: document.getElementById('recipients').value.trim(),
      'g-recaptcha-response': grecaptcha.getResponse()
    };

    if (!data['g-recaptcha-response']) {
      alert('Please complete the CAPTCHA');
      return;
    }

    document.getElementById('sendBtn').disabled = true;
    document.getElementById('sendBtn').innerText = '⏳ Sending...';

    fetch('/send', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
      alert(res.message);
      document.getElementById('sendBtn').innerText = 'Send All';
      grecaptcha.reset();
    })
    .catch(() => {
      alert('Error occurred');
      document.getElementById('sendBtn').innerText = 'Send All';
      grecaptcha.reset();
    });
  });
</script>
